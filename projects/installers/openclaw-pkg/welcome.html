<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>歡迎</title>
    <style>
        body { font-family: "PingFang TC", "Helvetica Neue", sans-serif; font-size: 14px; line-height: 1.6; }
        h1 { font-size: 24px; font-weight: 600; }
        p { margin: 10px 0; }
        .warning { background: #fff3cd; border-left: 4px solid #ffc107; padding: 12px; margin: 15px 0; }
        .warning strong { color: #856404; }
    </style>
</head>
<body>
    <h1>歡迎使用 OpenClaw Installer</h1>
    <p>這個安裝程式會自動為您安裝 OpenClaw 及所需的依賴套件（Homebrew、Node.js 等）。</p>
    
    <div class="warning">
        <strong>⚠️ 系統需求</strong><br>
        最低需求：<strong>macOS 12 Monterey</strong> 或更新版本<br>
        若您使用 macOS 11 或更舊版本，安裝將會失敗。
    </div>
    
    <p><strong>安裝過程可能需要 10–30 分鐘</strong>，請保持網路連線並耐心等候。</p>
    <p>安裝完成後，請開啟「OpenClaw Setup」應用程式繼續設定您的 Telegram Bot 與 API Keys。</p>
</body>
</html>
