<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>安裝完成</title>
    <style>
        body { font-family: "PingFang TC", "Helvetica Neue", sans-serif; font-size: 14px; line-height: 1.6; }
        h1 { font-size: 24px; font-weight: 600; color: #28a745; }
        p { margin: 10px 0; }
        code { background: #f4f4f4; padding: 2px 6px; border-radius: 3px; font-family: Menlo, monospace; }
    </style>
</head>
<body>
    <h1>✅ OpenClaw 安裝完成！</h1>
    <p>安裝日誌已儲存至：<code>/tmp/openclaw-install.log</code></p>
    <p><strong>下一步：</strong></p>
    <ol>
        <li>開啟「應用程式」資料夾中的「OpenClaw Setup」</li>
        <li>按「檢查 OpenClaw」驗證安裝</li>
        <li>填入您的 Telegram Bot Token 與 OpenAI API Key</li>
        <li>按「套用設定」完成設定</li>
    </ol>
    <p>如果安裝過程中遇到問題，請檢查 <code>/tmp/openclaw-install.log</code> 的內容。</p>
</body>
</html>
