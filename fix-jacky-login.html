<!DOCTYPE html>
<html>
<head>
  <title>清理 Step1ne 系統快取</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    button {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      margin: 10px 5px;
    }
    button:hover {
      background: #4338ca;
    }
    .success {
      background: #10b981;
      padding: 12px;
      border-radius: 8px;
      color: white;
      margin-top: 20px;
      display: none;
    }
    .info {
      background: #eff6ff;
      padding: 15px;
      border-radius: 8px;
      margin: 15px 0;
      border-left: 4px solid #3b82f6;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔧 Step1ne 系統快取清理工具</h1>
    
    <div class="info">
      <strong>問題診斷：</strong><br>
      Jacky Chen 登入後沒有 Sidebar，可能是 localStorage 儲存了舊的用戶資料。
    </div>
    
    <h3>目前儲存的資料：</h3>
    <pre id="current-data" style="background: #f3f4f6; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 12px;"></pre>
    
    <button onclick="clearAll()">🗑️ 清除所有快取</button>
    <button onclick="checkData()">🔍 重新檢查</button>
    <button onclick="goToLogin()">🔐 前往登入頁</button>
    
    <div id="success" class="success">
      ✅ 快取已清除！請點擊「前往登入頁」重新登入。
    </div>
  </div>

  <script>
    function checkData() {
      const data = {
        'caseflow_profile': localStorage.getItem('caseflow_profile'),
        'caseflow_users_db': localStorage.getItem('caseflow_users_db'),
        'caseflow_users_initialized': localStorage.getItem('caseflow_users_initialized'),
        'auth_user': localStorage.getItem('auth_user'),
      };
      
      document.getElementById('current-data').textContent = JSON.stringify(data, null, 2);
    }
    
    function clearAll() {
      // 清除所有 Step1ne 相關的 localStorage
      const keysToRemove = [
        'caseflow_profile',
        'caseflow_users_db',
        'caseflow_users_initialized',
        'auth_user',
        'caseflow_online_users'
      ];
      
      keysToRemove.forEach(key => {
        localStorage.removeItem(key);
        console.log(`✅ 已清除: ${key}`);
      });
      
      document.getElementById('success').style.display = 'block';
      checkData();
    }
    
    function goToLogin() {
      window.location.href = 'https://step1ne.zeabur.app';
    }
    
    // 初始檢查
    checkData();
  </script>
</body>
</html>
